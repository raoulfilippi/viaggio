<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌴 Indonesia 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --ocean:#073b5a; --lagoon:#0e7da3; --sand:#e8dcc8; --rice:#f8f9fa;
  --java:#258a5c; --turmeric:#e69c0d; --coral:#d94838; --ink:#2c3342;
  --mist:#738596; --border:#d1d9e2; --white:#ffffff;
  --warn-bg:#fffcf0; --warn-br:#f0c040; --err-bg:#fff5f4; --err-br:#e08070;
  --ok-bg:#f0faf3; --ok-br:#70c090; --shadow:0 4px 15px rgba(0,0,0,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--rice);color:var(--ink);font-size:14px;min-height:100vh;}

/* HEADER */
header{background:linear-gradient(135deg,var(--ocean) 0%,var(--lagoon) 80%,#1cb1db 100%);color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(7,59,90,0.4);}
.hdr-top{display:flex;align-items:center;gap:12px;padding:12px 16px 8px;}
.hdr-title h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.hdr-title .sub{font-size:11px;opacity:0.85;margin-top:2px;}
.hdr-right{margin-left:auto;text-align:right;font-size:11px;opacity:0.9;line-height:1.4;}
.hdr-right strong{font-size:18px;display:block;color:var(--turmeric);}
nav{display:flex;gap:2px;padding:0 8px;overflow-x:auto;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
nav button{background:none;border:none;color:rgba(255,255,255,0.75);cursor:pointer;padding:10px 14px 8px;font-size:13px;font-weight:600;white-space:nowrap;border-bottom:3px solid transparent;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
nav button.active{color:#fff;border-bottom-color:var(--turmeric);background:rgba(255,255,255,0.12);}

/* LAYOUT */
main{padding:16px;}
.tab{display:none;}
.tab.active{display:block;}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:16px;box-shadow:var(--shadow);}
.toolbar .spacer{flex:1;}
input[type=file]{display:none;}
.btn{padding:9px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--ocean);color:#fff;}
.btn-accent{background:var(--turmeric);color:#fff;}
.btn-green{background:var(--java);color:#fff;}
.btn-ghost{background:transparent;color:var(--ocean);border:1.5px solid var(--ocean);}
.btn-danger{background:var(--coral);color:#fff;}
.btn-sm{padding:7px 12px;font-size:12px;}

input[type=text],input[type=date],input[type=number],select,textarea{
  padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;
  font:inherit;color:var(--ink);background:#fbfcfd;outline:none;transition:border 0.2s;
  font-size:16px; /* prevents zoom on iOS */
}
input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--lagoon);}
select{cursor:pointer;}

/* KPI — 2 colonne su mobile, 6 su desktop */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;border-top:4px solid var(--ocean);box-shadow:var(--shadow);}
.kpi.amber{border-top-color:var(--turmeric);}
.kpi.green{border-top-color:var(--java);}
.kpi.red{border-top-color:var(--coral);}
.kpi .val{font-size:20px;font-weight:800;color:var(--ocean);line-height:1;}
.kpi.amber .val{color:var(--turmeric);}
.kpi.green .val{color:var(--java);}
.kpi.red .val{color:var(--coral);}
.kpi .lbl{font-size:10px;color:var(--mist);margin-top:4px;text-transform:uppercase;letter-spacing:0.4px;font-weight:600;}

/* ALERTS */
.alerts{margin-bottom:12px;}
.alert{border-radius:10px;padding:10px 14px;font-size:13px;display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;border-left:4px solid;}
.alert-warn{background:var(--warn-bg);border-color:var(--warn-br);color:#6b4c00;}
.alert-err{background:var(--err-bg);border-color:var(--err-br);color:#7a2020;}
.alert-ok{background:var(--ok-bg);border-color:var(--ok-br);color:#1a4a2a;}
.alert-info{background:#e8f4fa;border-color:var(--lagoon);color:#0a3a56;}
.alert .ai{font-size:16px;}

/* SECTION HEADING */
.sh{display:flex;align-items:center;gap:10px;margin:20px 0 12px;}
.sh:first-child{margin-top:0;}
.sh h2{font-size:16px;font-weight:700;color:var(--ocean);}

/* CARDS (sostituiscono le tabelle su mobile) */
.card-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-title{font-weight:700;font-size:14px;color:var(--ink);}
.card-actions{display:flex;gap:6px;}
.dr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #f0f3f5;font-size:13px;}
.dr:last-child{border-bottom:none;}
.dr .dk{color:var(--mist);white-space:nowrap;flex-shrink:0;font-weight:500;}
.dr .dv{font-weight:600;text-align:right;word-break:break-word;color:var(--ink);}

/* TIMELINE */
.timeline{position:relative;padding-left:28px;}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:var(--border);border-radius:3px;}
.tl-day{position:relative;margin-bottom:12px;}
.tl-node{position:absolute;left:-24px;top:14px;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px var(--border);background:var(--mist);}
.tl-node.t-only{background:var(--lagoon);box-shadow:0 0 0 2px var(--lagoon);}
.tl-node.h-only{background:var(--java);box-shadow:0 0 0 2px var(--java);}
.tl-node.both{background:var(--turmeric);box-shadow:0 0 0 2px var(--turmeric);}
.tl-node.warn{background:var(--coral);box-shadow:0 0 0 2px var(--coral);}
.tl-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.tl-card.expanded .tl-body{display:block;}
.tl-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;flex-wrap:wrap;}
.tl-dn{background:var(--ocean);color:#fff;border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;white-space:nowrap;}
.tl-date{font-size:12px;color:var(--mist);white-space:nowrap;}
.tl-loc{font-weight:800;font-size:14px;flex:1;}
.tl-chips{display:flex;gap:5px;flex-wrap:wrap;}
.tl-warn-dot{background:var(--coral);color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;}
.tl-body{display:none;border-top:1px solid var(--border);padding:14px;}
.tl-panel{margin-bottom:14px;}
.tl-panel+.tl-panel{border-top:1px solid var(--border);padding-top:14px;}
.tl-panel h4{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--mist);margin-bottom:10px;font-weight:800;}
.tl-actions{display:flex;gap:8px;padding:10px 14px;background:#f9fafc;border-top:1px solid var(--border);}

/* CALENDAR */
.cal-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;box-shadow:var(--shadow);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dh{text-align:center;font-size:10px;font-weight:800;color:var(--mist);padding:3px;text-transform:uppercase;}
.cal-d{border-radius:6px;padding:4px;min-height:48px;font-size:11px;border:2px solid transparent;cursor:pointer;transition:all 0.15s;}
.cal-d.empty{cursor:default;background:transparent!important;}
.cal-d .dn{font-weight:800;font-size:13px;line-height:1;}
.cal-d .dl{font-size:9px;color:var(--mist);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-d .dd{margin-top:4px;display:flex;gap:2px;flex-wrap:wrap;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot-t{background:var(--lagoon);}
.dot-h{background:var(--java);}
.dot-w{background:var(--coral);}
.c-MXP{background:#f0f0f2;border-color:#d0d0d8;}
.c-JAKARTA{background:#e1f3fc;border-color:#a8dcf0;}
.c-YOGYAKARTA{background:#e8f7ec;border-color:#a3dbb6;}
.c-UBUD{background:#fdf6e3;border-color:#eed899;}
.c-GILIT{background:#e4fbf3;border-color:#98e8c8;}
.c-LABUANBAJO{background:#fcebe8;border-color:#efb5ab;}
.cal-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mist);}
.leg-sw{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,0.1);}

/* CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.chip-fly{background:#def0fa;color:var(--ocean);}
.chip-ferry{background:#fef0d8;color:#8b5a00;}
.chip-tour{background:#fde8e8;color:var(--coral);}
.chip-transfer{background:#e8e8fe;color:#4040a0;}
.chip-hotel{background:#e8f4e8;color:var(--java);}

/* TAGS */
.tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700;}
.tag-unpaid{background:#fde8e8;color:var(--coral);border:1px solid #fabebb;}
.tag-paid{background:#e8f4e8;color:var(--java);border:1px solid #bce2bc;}
.tag-parz{background:var(--warn-bg);color:#8b6000;border:1px solid #f2da93;}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:none;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-height:92vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:800;color:var(--ocean);margin-bottom:18px;}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.form-row label{font-size:11px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:0.5px;}
.form-row input,.form-row select,.form-row textarea{width:100%;}
.form-row textarea{resize:vertical;min-height:80px;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* TOOLBAR — stack verticale su mobile stretto */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:16px;box-shadow:var(--shadow);}
.toolbar .spacer{flex:1;}

/* FORM — 1 colonna su mobile */
.form-2col{display:grid;grid-template-columns:1fr;gap:10px;}

/* MODAL — bottom sheet su mobile */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:500;display:none;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;color:var(--ocean);margin-bottom:16px;}

/* CALENDARIO — testo minimo su mobile */
.cal-d .dl{font-size:8px;color:var(--mist);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cal-dh{text-align:center;font-size:9px;font-weight:800;color:var(--mist);padding:2px;text-transform:uppercase;}

/* TIMELINE HEAD — wrap pulito */
.tl-head{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;flex-wrap:wrap;-webkit-tap-highlight-color:transparent;}
.tl-dn{background:var(--ocean);color:#fff;border-radius:6px;padding:3px 7px;font-size:11px;font-weight:700;white-space:nowrap;}
.tl-date{font-size:11px;color:var(--mist);white-space:nowrap;}
.tl-loc{font-weight:800;font-size:13px;flex:1;min-width:80px;}

@media(min-width:640px){
  .kpi-row{grid-template-columns:repeat(6,1fr);}
  .kpi .val{font-size:26px;}
  .kpi{padding:16px 10px;}
  main{padding:20px 24px;max-width:960px;margin:0 auto;}
  .modal-overlay{align-items:center;padding:20px;}
  .modal{border-radius:16px;max-width:560px;padding:28px;}
  .form-2col{grid-template-columns:1fr 1fr;}
  .tl-loc{font-size:15px;}
}
.empty{text-align:center;padding:32px 20px;color:var(--mist);}
.empty .big{font-size:40px;margin-bottom:10px;}
.idr{font-size:11px;color:var(--mist);}
code{background:#f0f3f5;padding:2px 5px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--ocean);}
.sep{border:none;border-top:1px solid var(--border);margin:20px 0;}
.bar-row{margin-bottom:14px;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.bar-track{height:10px;border-radius:5px;background:#edf1f5;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width 0.8s ease;}
.status-bar{font-size:12px;font-weight:600;color:var(--mist);padding:6px 0 0;text-align:center;}
.map-tooltip{background:#073b5a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;padding:4px 8px;}
.map-tooltip::before{border-top-color:#073b5a;}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div style="font-size:32px">🌴</div>
    <div class="hdr-title">
      <h1>Indonesia 2026</h1>
      <div class="sub">Pianificatore — 22 giorni</div>
    </div>
    <div class="hdr-right">
      <strong id="hdr-countdown">—</strong>
      giorni alla partenza
    </div>
  </div>
  <nav>
    <button class="active" onclick="goTab('dashboard',this)">📊 Dashboard</button>
    <button onclick="goTab('itinerario',this)">📅 Itinerario</button>
    <button onclick="goTab('trasferimenti',this)">✈️ Transfers</button>
    <button onclick="goTab('alloggi',this)">🏨 Alloggi</button>
    <button onclick="goTab('costi',this)">💶 Costi</button>
    <button onclick="goTab('note',this)">📝 Note</button>
    <button onclick="goTab('mappa',this)">🗺️ Mappa</button>
  </nav>
</header>

<main>

<!-- DASHBOARD -->
<div id="tab-dashboard" class="tab active">
  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="document.getElementById('fi').click()">📂 Importa</button>
    <input type="file" id="fi" accept=".xlsx,.xls" onchange="importExcel(this)">
    <button class="btn btn-accent btn-sm" onclick="exportExcel()">⬇️ Esporta</button>
    <div class="spacer"></div>
    <button class="btn btn-green btn-sm" onclick="manualSave()">☁️ Salva</button>
    <button class="btn btn-ghost btn-sm" onclick="loadFirestore(true)">🔄</button>
  </div>
  <div class="status-bar" id="last-saved">💾 Pronto</div>
  <div class="kpi-row" id="db-kpi" style="margin-top:12px"></div>
  <div class="alerts" id="db-alerts"></div>
  <div class="sh"><h2>📆 Agosto 2026</h2></div>
  <div class="cal-wrap">
    <div class="cal-legend" id="cal-legend"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="sh"><h2>📍 Destinazioni</h2></div>
  <div class="card-list" id="db-dest"></div>
</div>

<!-- ITINERARIO -->
<div id="tab-itinerario" class="tab">
  <div class="toolbar">
    <input type="text" id="it-search" placeholder="🔍 Cerca…" style="flex:1;min-width:120px;font-size:14px" oninput="renderItinerary()">
    <select id="it-dest" onchange="renderItinerary()" style="font-size:14px">
      <option value="">Tutte</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="openAddDay()">+ Giorno</button>
  </div>
  <div class="timeline" id="tl-cont"></div>
</div>

<!-- TRASFERIMENTI -->
<div id="tab-trasferimenti" class="tab">
  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="openAddTransfer()">+ Transfer</button>
    <div class="spacer"></div>
    <button class="btn btn-accent btn-sm" onclick="exportExcel()">⬇️ Esporta</button>
  </div>
  <div class="alerts" id="tr-alerts"></div>
  <div class="card-list" id="tr-list"></div>
</div>

<!-- ALLOGGI -->
<div id="tab-alloggi" class="tab">
  <div class="toolbar">
    <button class="btn btn-primary btn-sm" onclick="openAddHotel()">+ Alloggio</button>
    <div class="spacer"></div>
    <button class="btn btn-accent btn-sm" onclick="exportExcel()">⬇️ Esporta</button>
  </div>
  <div class="alerts" id="ho-alerts"></div>
  <div class="card-list" id="ho-list"></div>
</div>

<!-- COSTI -->
<div id="tab-costi" class="tab">
  <div class="kpi-row" id="co-kpi"></div>
  <div class="card-list" id="co-list"></div>
  <div class="sh"><h2>📊 Distribuzione</h2></div>
  <div class="card" id="co-bars"></div>
</div>

<!-- NOTE -->
<div id="tab-note" class="tab">
  <div class="sh"><h2>📝 Note libere</h2></div>
  <textarea id="nt-area" style="width:100%;min-height:180px;border-radius:12px;padding:14px;font-size:15px;border:1.5px solid var(--border);line-height:1.5" placeholder="Scrivi qui note, consigli, numeri utili…" oninput="handleNotesInput()"></textarea>
  <div class="sh" style="margin-top:20px"><h2>💳 Da pagare</h2></div>
  <div class="card-list" id="nt-pay"></div>
  <div class="sh"><h2>📄 Riferimenti</h2></div>
  <div class="card-list" id="nt-docs"></div>
</div>

<!-- MAPPA -->
<div id="tab-mappa" class="tab">
  <div class="sh"><h2>🗺️ Percorso di viaggio</h2></div>
  <div id="map" style="height:460px;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;"></div>
  <div class="card-list" id="map-legend" style="margin-top:14px;"></div>
</div>

</main>

<!-- MODAL TRANSFER -->
<div class="modal-overlay" id="modal-transfer">
  <div class="modal">
    <h3 id="mt-title">✈️ Trasferimento</h3>
    <div class="form-2col">
      <div class="form-row"><label>Data</label><input type="date" id="mt-data"></div>
      <div class="form-row"><label>Tipo</label>
        <select id="mt-tipo"><option>Volo</option><option>Traghetto</option><option>Tour</option><option>Taxi/Auto</option><option>Bus</option><option>Altro</option></select>
      </div>
    </div>
    <div class="form-row"><label>Vettore / Mezzo</label><input type="text" id="mt-nome"></div>
    <div class="form-2col">
      <div class="form-row"><label>Da</label><input type="text" id="mt-da"></div>
      <div class="form-row"><label>A</label><input type="text" id="mt-a"></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Partenza</label><input type="text" id="mt-ora-p" placeholder="15:45"></div>
      <div class="form-row"><label>Arrivo</label><input type="text" id="mt-ora-a" placeholder="17:00"></div>
    </div>
    <div class="form-2col">
      <div class="form-row"><label>Costo (€)</label><input type="number" id="mt-costo" step="0.01" min="0"></div>
      <div class="form-row"><label>Pagato</label>
        <select id="mt-pagato"><option value="">—</option><option value="SI">Sì</option><option value="PARZ">Parziale</option><option value="NO">No</option></select>
      </div>
    </div>
    <div class="form-row"><label>Rif. prenotazione</label><input type="text" id="mt-ref"></div>
    <div class="form-row"><label>Note</label><textarea id="mt-note"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-transfer')">Annulla</button>
      <button class="btn btn-primary" onclick="saveTransfer()">💾 Salva</button>
    </div>
  </div>
</div>

<!-- MODAL HOTEL -->
<div class="modal-overlay" id="modal-hotel">
  <div class="modal">
    <h3 id="mh-title">🏨 Alloggio</h3>
    <div class="form-row"><label>Nome struttura</label><input type="text" id="mh-nome"></div>
    <div class="form-row"><label>Destinazione</label><input type="text" id="mh-dest"></div>
    <div class="form-2col">

function saveLS() {
  try {
    localStorage.setItem(LOCAL_KEY, JSON.stringify({
      days: state.days, transfers: state.transfers,
      hotels: state.hotels, extraCosts: state.extraCosts,
      travelNotes: state.travelNotes, ts: new Date().toISOString()
    }));
    return true;
  } catch(e) { return false; }
}

function loadLS() {
  try {
    var raw = localStorage.getItem(LOCAL_KEY);
    if (!raw) return false;
    var d = JSON.parse(raw);
    if (d.days) state.days = d.days;
    if (d.transfers) state.transfers = d.transfers;
    if (d.hotels) state.hotels = d.hotels;
    if (d.extraCosts) state.extraCosts = d.extraCosts;
    if (d.travelNotes !== undefined) state.travelNotes = d.travelNotes;
    return d.ts || true;
  } catch(e) { return false; }
}

function saveFirestore(showFeedback) {
  if (!fbReady || !db) {
    // Solo localStorage
    var ok = saveLS();
    var now = new Date().toLocaleTimeString('it-IT');
    setStatus(ok ? '💾 Salvato in locale · ' + now : '❌ Errore salvataggio', ok ? 'var(--java)' : 'var(--coral)');
    if (showFeedback) alert(ok ? '✅ Dati salvati localmente!' : '❌ Errore salvataggio.');
    return;
  }
  saveLS(); // backup locale sempre
  var data = {
    days: state.days, transfers: state.transfers,
    hotels: state.hotels, extraCosts: state.extraCosts,
    travelNotes: state.travelNotes,
    ultimaModifica: firebase.firestore.FieldValue.serverTimestamp()
  };
  db.collection(FB_COLLECTION).doc(FB_DOC_ID).set(data, {merge: true})
    .then(function() {
      var now = new Date().toLocaleTimeString('it-IT');
      setStatus('☁️ Salvato su Firebase · ' + now, 'var(--java)');
      if (showFeedback) alert('✅ Dati salvati su Firebase!');
    })
    .catch(function(e) {
      console.error('Firestore save error:', e);
      setStatus('⚠️ Cloud non raggiungibile — salvato in locale', 'var(--turmeric)');
    });
}

function loadFirestore(showFeedback) {
  if (!fbReady || !db) return;
  setStatus('⏳ Sincronizzazione Firebase…', 'var(--mist)');
  db.collection(FB_COLLECTION).doc(FB_DOC_ID).get()
    .then(function(doc) {
      if (doc.exists) {
        var d = doc.data();
        if (d.days) state.days = d.days;
        if (d.transfers) state.transfers = d.transfers;
        if (d.hotels) state.hotels = d.hotels;
        if (d.extraCosts) state.extraCosts = d.extraCosts;
        if (d.travelNotes !== undefined) state.travelNotes = d.travelNotes;
        saveLS(); // aggiorna cache locale
        var ts = d.ultimaModifica ? d.ultimaModifica.toDate().toLocaleTimeString('it-IT') : '';
        setStatus('☁️ Dati Firebase' + (ts ? ' · ' + ts : ''), 'var(--ocean)');
        renderDashboard();
        if (showFeedback) alert('✅ Dati ricaricati da Firebase!');
      } else {
        // Documento vuoto → salva i default
        saveFirestore(false);
      }
    })
    .catch(function(e) {
      console.warn('Firestore load error:', e);
      setStatus('⚠️ Firebase non raggiungibile — dati locali', 'var(--turmeric)');
    });
}

// ════════════════════════════════════════
function uid() { return 'id' + Date.now() + Math.random().toString(36).slice(2,6); }
function fmtD(s, short) {
  if (!s) return '—';
  var d = new Date(s + 'T00:00:00');
  return short ? d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'})
               : d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
}
function nights(a, b) {
  if (!a || !b) return '—';
  var n = Math.round((new Date(b) - new Date(a)) / 86400000);
  return n > 0 ? n : '—';
}
function paidBadge(p) {
  if (p==='SI')   return '<span class="tag tag-paid">✓ Pagato</span>';
  if (p==='PARZ') return '<span class="tag tag-parz">◑ Parziale</span>';
  if (p==='NO')   return '<span class="tag tag-unpaid">✗ Non pagato</span>';
  return '<span class="tag tag-unpaid">? Da verificare</span>';
}
function tipChip(tipo) {
  var cls = {Volo:'chip-fly',Traghetto:'chip-ferry',Tour:'chip-tour'};
  return '<span class="chip ' + (cls[tipo]||'chip-transfer') + '">' + (TIPO_ICON[tipo]||'🔀') + ' ' + tipo + '</span>';
}
function cmp(a,b) { return a<b?-1:a>b?1:0; }
function hotelsForDate(dt) {
  return state.hotels.filter(function(h) { return h.cin && h.cout && dt >= h.cin && dt < h.cout; });
}
function transfersForDate(dt) {
  return state.transfers.filter(function(t) { return t.data === dt; });
}
function dayObj(dt) { return state.days.find(function(d) { return d.data === dt; }) || null; }
function locForDate(dt) { var d = dayObj(dt); return d ? d.localita : ''; }

function runChecks() {
  var issues = [];
  state.days.forEach(function(d) {
    if (d.localita === 'MXP') return;
    var h = hotelsForDate(d.data);
    if (!h.length) {
      var isOut = state.hotels.some(function(hh) { return hh.cout === d.data; });
      if (!isOut) issues.push({type:'warn', msg:'Giorno ' + d.giorno + ' (' + fmtD(d.data,true) + ') – <strong>' + d.localita + '</strong>: nessun alloggio.'});
    }
  });
  for (var i=0; i<state.hotels.length; i++) {
    for (var j=i+1; j<state.hotels.length; j++) {
      var a=state.hotels[i], b=state.hotels[j];
      if (a.cin && a.cout && b.cin && b.cout && a.cin < b.cout && b.cin < a.cout)
        issues.push({type:'err', msg:'Sovrapposizione: <strong>' + a.nome + '</strong> e <strong>' + b.nome + '</strong>.'});
    }
  }
  state.hotels.forEach(function(h) {
    if (!h.costoEUR) issues.push({type:'warn', msg:'Alloggio <strong>' + h.nome + '</strong>: costo mancante.'});
  });
  return issues;
}

function alertsHTML(issues) {
  if (!issues.length) return '<div class="alert alert-ok"><span class="ai">✅</span><span>Nessun problema rilevato.</span></div>';
  return issues.map(function(i) {
    return '<div class="alert alert-' + (i.type==='err'?'err':'warn') + '"><span class="ai">' + (i.type==='err'?'🚨':'⚠️') + '</span><span>' + i.msg + '</span></div>';
  }).join('');
}

  var fn = {dashboard:renderDashboard, itinerario:renderItinerary,
    trasferimenti:renderTransfers, alloggi:renderHotels, costi:renderCosts, note:renderNotes, mappa:renderMappa};
  if (fn[name]) fn[name]();
}

function renderDashboard() {
  var diff = Math.ceil((new Date('2026-08-08') - new Date()) / 86400000);
  document.getElementById('hdr-countdown').textContent = diff > 0 ? diff : (diff === 0 ? 'OGGI 🎉' : 'Partiti!');

  var dests = [...new Set(state.days.filter(function(d) { return d.localita && d.localita !== 'MXP'; }).map(function(d) { return d.localita; }))];
  var voli = state.transfers.filter(function(t) { return t.tipo === 'Volo'; });
  var totH = state.hotels.reduce(function(s,h) { return s + (h.costoEUR||0); }, 0);
  var totE = state.extraCosts.reduce(function(s,e) { return s + (e.costoEUR||0); }, 0);
  var totT = state.transfers.filter(function(t) { return t.costo; }).reduce(function(s,t) { return s + (t.costo||0); }, 0);
  var tot = totH + totE + totT;
  var unpaid = state.hotels.filter(function(h) { return h.pagato !== 'SI'; }).length;

  document.getElementById('db-kpi').innerHTML =
    '<div class="kpi"><div class="val">' + state.days.length + '</div><div class="lbl">Giorni</div></div>' +
    '<div class="kpi green"><div class="val">' + dests.length + '</div><div class="lbl">Destinazioni</div></div>' +
    '<div class="kpi amber"><div class="val">' + voli.length + '</div><div class="lbl">Voli</div></div>' +
    '<div class="kpi"><div class="val">' + state.hotels.length + '</div><div class="lbl">Alloggi</div></div>' +
    '<div class="kpi red"><div class="val">€' + Math.round(tot).toLocaleString('it-IT') + '</div><div class="lbl">Costo stimato</div></div>' +
    '<div class="kpi amber"><div class="val">' + unpaid + '</div><div class="lbl">Da pagare</div></div>';

  document.getElementById('db-alerts').innerHTML = alertsHTML(runChecks());
  renderCalendar();
  renderDestCards();
}

function renderCalendar() {
  var grid = document.getElementById('cal-grid');
  var legend = document.getElementById('cal-legend');
  var legDefs = [
    {col:'#f0f0f2',lbl:'Italia'},{col:'#e1f3fc',lbl:'Jakarta'},
    {col:'#e8f7ec',lbl:'Yogyakarta'},{col:'#fdf6e3',lbl:'Ubud'},
    {col:'#e4fbf3',lbl:'Gili T.'},{col:'#fcebe8',lbl:'Labuan Bajo'}
  ];
  legend.innerHTML = legDefs.map(function(l) {
    return '<div class="leg"><div class="leg-sw" style="background:' + l.col + '"></div>' + l.lbl + '</div>';
  }).join('') + '<div class="leg"><span class="dot dot-t"></span>Transfer</div><div class="leg"><span class="dot dot-h"></span>Alloggio</div>';

  var days = ['Lu','Ma','Me','Gi','Ve','Sa','Do'];
  grid.innerHTML = days.map(function(d) { return '<div class="cal-dh">' + d + '</div>'; }).join('');
  var firstDow = (new Date('2026-08-01').getDay() + 6) % 7;
  for (var i=0; i<firstDow; i++) grid.innerHTML += '<div class="cal-d empty"></div>';
  for (var i=1; i<=31; i++) {
    var iso = '2026-08-' + String(i).padStart(2,'0');
    var d = dayObj(iso);
    var loc = d ? d.localita : '';
    var cls = LOC_CLASS[loc] || '';
    var hs = hotelsForDate(iso);
    var ts = transfersForDate(iso);
    var dow = (new Date(iso + 'T00:00:00').getDay() + 6) % 7;
    var dots = '';
    if (ts.length) dots += '<span class="dot dot-t"></span>';
    if (hs.length) dots += '<span class="dot dot-h"></span>';
    var idx = state.days.findIndex(function(dd) { return dd.data === iso; });
    var click = idx >= 0 ? 'onclick="openDayInItinerary(' + idx + ')"' : '';
    grid.innerHTML += '<div class="cal-d ' + cls + '" ' + click + '>' +
      '<div class="dn" style="' + (dow>=5?'color:var(--coral)':'') + '">' + i + '</div>' +
      '<div class="dl">' + (loc ? (LOC_FLAGS[loc]||'') + loc.substring(0,6) : '') + '</div>' +
      '<div class="dd">' + dots + '</div></div>';
  }
}

function openDayInItinerary(idx) {
  goTab('itinerario', document.querySelector('nav button[onclick*="itinerario"]'));

      card.classList.add('expanded');
      card.scrollIntoView({behavior:'smooth', block:'center'});
      card.style.boxShadow = '0 0 0 3px var(--lagoon)';
      setTimeout(function() { card.style.boxShadow = ''; }, 1500);
    }

}

  var rows = {};

  });

  Object.values(rows).forEach(function(r) {

// ════════════════════════════════════════
//  ITINERARIO
// ════════════════════════════════════════
function renderItinerary() {
  var search = (document.getElementById('it-search').value || '').toLowerCase();
  var fDest = document.getElementById('it-dest').value;
  var issues = runChecks();

  var dests = [...new Set(state.days.map(function(d) { return d.localita; }))];
  var sel = document.getElementById('it-dest');
  if (sel.options.length <= 1) {
    dests.forEach(function(d) {
      var o = document.createElement('option');
      o.value = d; o.textContent = (LOC_FLAGS[d]||'') + ' ' + d;
      sel.appendChild(o);
    });
  }

  var cont = document.getElementById('tl-cont');
  var html = '';

  state.days.forEach(function(day, idx) {
    var loc = day.localita || '';
    if (fDest && loc !== fDest) return;
    if (search && !loc.toLowerCase().includes(search) &&
        !hotelsForDate(day.data).some(function(h) { return h.nome.toLowerCase().includes(search); }) &&
        !transfersForDate(day.data).some(function(t) { return (t.nome+t.note).toLowerCase().includes(search); })) return;

    var hs = hotelsForDate(day.data);
    var ts = transfersForDate(day.data);
    var dayIssues = issues.filter(function(i) { return i.msg.includes('Giorno ' + day.giorno) || i.msg.includes(fmtD(day.data,true)); });

    var nodeCls = 'tl-node';
    if (dayIssues.length) nodeCls += ' warn';
    else if (ts.length && hs.length) nodeCls += ' both';
    else if (ts.length) nodeCls += ' t-only';
    else if (hs.length) nodeCls += ' h-only';

    var chips = '';
    ts.forEach(function(t) { chips += tipChip(t.tipo); });
    if (hs.length) chips += '<span class="chip chip-hotel">🏨 ' + hs[0].nome.substring(0,20) + (hs[0].nome.length>20?'…':'') + '</span>';
    if (dayIssues.length) chips += '<span class="tl-warn-dot">⚠️ ' + dayIssues.length + '</span>';

    // Transfer panel
    var tPanel = '';
    if (ts.length) {
      tPanel = ts.map(function(t) {
        return '<div class="dr"><span class="dk">Tipo</span><span class="dv">' + tipChip(t.tipo) + '</span></div>' +
          '<div class="dr"><span class="dk">Vettore</span><span class="dv">' + (t.nome||'—') + '</span></div>' +
          '<div class="dr"><span class="dk">Tratta</span><span class="dv" style="font-size:12px">' + (t.da||'—') + ' → ' + (t.a||'—') + '</span></div>' +
          '<div class="dr"><span class="dk">Orari</span><span class="dv">' + (t.oraP||'?') + ' → ' + (t.oraA||'?') + '</span></div>' +
          '<div class="dr"><span class="dk">Costo</span><span class="dv">€' + (t.costo||'—') + '</span></div>' +
          '<div class="dr"><span class="dk">Pagato</span><span class="dv">' + paidBadge(t.pagato) + '</span></div>' +
          (t.note ? '<div class="dr"><span class="dk">Note</span><span class="dv" style="font-size:12px">' + t.note + '</span></div>' : '') +
          '<div style="text-align:right;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="openEditTransfer(\'' + t.id + '\')">✏️ Modifica</button></div>';
      }).join('<hr style="border:none;border-top:1px dashed var(--border);margin:10px 0">');
    } else {
      tPanel = '<p style="color:var(--mist);font-size:13px">Nessun trasferimento. <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="openAddTransferDate(\'' + day.data + '\')">+ Aggiungi</button></p>';
    }

    // Hotel panel
    var hPanel = '';
    if (hs.length) {
      hPanel = hs.map(function(h) {
        var isCI = h.cin === day.data, isCO = h.cout === day.data;
        var badge = isCI ? '<span style="color:var(--java)">▶ Check-in</span>' : isCO ? '<span style="color:var(--coral)">◀ Check-out</span>' : 'In corso';
        return '<div class="dr"><span class="dk">Struttura</span><span class="dv" style="font-size:12px">' + h.nome + '</span></div>' +
          '<div class="dr"><span class="dk">Stato</span><span class="dv">' + badge + '</span></div>' +
          '<div class="dr"><span class="dk">Notti</span><span class="dv">' + nights(h.cin,h.cout) + '</span></div>' +
          '<div class="dr"><span class="dk">Costo</span><span class="dv">€' + (h.costoEUR ? h.costoEUR.toFixed(2) : '—') + '</span></div>' +
          '<div class="dr"><span class="dk">Pagato</span><span class="dv">' + paidBadge(h.pagato) + '</span></div>' +
          (h.ref ? '<div class="dr"><span class="dk">Rif.</span><span class="dv"><code>' + h.ref + '</code></span></div>' : '') +
          '<div class="dr"><span class="dk">Link</span><span class="dv">' + (h.url ? '<a href="' + h.url + '" target="_blank" style="color:var(--lagoon);font-weight:700;font-size:12px">Booking ↗</a>' : '<span style="color:var(--mist);font-size:12px;font-style:italic">—</span>') + '</span></div>' +
          (h.note ? '<div class="dr"><span class="dk">Note</span><span class="dv" style="font-size:12px">' + h.note + '</span></div>' : '') +
          '<div style="text-align:right;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="openEditHotel(\'' + h.id + '\')">✏️ Modifica</button></div>';
      }).join('<hr style="border:none;border-top:1px dashed var(--border);margin:10px 0">');
    } else {
      var isOut = state.hotels.some(function(h) { return h.cout === day.data; });
      hPanel = isOut ? '<p style="color:var(--mist);font-size:13px">Giorno di check-out.</p>' :
        loc === 'MXP' ? '<p style="color:var(--mist);font-size:13px">Partenza dall\'Italia.</p>' :
        '<p style="color:var(--coral);font-size:13px;font-weight:700">⚠️ Nessun alloggio.<br><button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="openAddHotelDate(\'' + day.data + '\')">+ Aggiungi</button></p>';
    }

    html += '<div class="tl-day">' +
      '<div class="' + nodeCls + '"></div>' +
      '<div class="tl-card" id="tlc-' + idx + '">' +
        '<div class="tl-head" onclick="toggleTl(\'tlc-' + idx + '\')">' +
          '<span class="tl-dn">G' + day.giorno + '</span>' +
          '<span class="tl-date">' + fmtD(day.data,true) + '</span>' +
          '<span class="tl-loc">' + (LOC_FLAGS[loc]||'') + ' ' + (loc||'—') + '</span>' +
          '<div class="tl-chips">' + chips + '</div>' +
          '<span style="color:var(--mist);margin-left:auto;font-size:14px">▾</span>' +
        '</div>' +
        '<div class="tl-body">' +
          '<div class="tl-panel"><h4>✈️ Trasferimenti</h4>' + tPanel + '</div>' +
          '<div class="tl-panel"><h4>🏨 Alloggio</h4>' + hPanel + '</div>' +
        '</div>' +
      '</div></div>';
  });

  cont.innerHTML = html || '<div class="empty"><div class="big">🔍</div><p>Nessun risultato.</p></div>';
}

// ════════════════════════════════════════
//  COSTI
// ════════════════════════════════════════
function renderCosts() {
  var rows = [];
  state.hotels.forEach(function(h) { rows.push({cat:'Hotel',voce:h.nome,eur:h.costoEUR||0,pagato:h.pagato,note:h.note||''}); });
  state.transfers.filter(function(t) { return t.costo; }).forEach(function(t) { rows.push({cat:t.tipo,voce:t.nome,eur:t.costo,pagato:t.pagato,note:t.note||''}); });
  state.extraCosts.forEach(function(e) { rows.push({cat:e.cat,voce:e.voce,eur:e.costoEUR||0,pagato:e.pagato,note:e.note||''}); });

  var totEur = rows.reduce(function(s,r) { return s+(r.eur||0); }, 0);
  var paid = rows.filter(function(r) { return r.pagato==='SI'; }).reduce(function(s,r) { return s+(r.eur||0); }, 0);
  var saldo = totEur - paid;

  document.getElementById('co-kpi').innerHTML =
    '<div class="kpi"><div class="val">€' + Math.round(totEur).toLocaleString('it-IT') + '</div><div class="lbl">Totale</div></div>' +
    '<div class="kpi green"><div class="val">€' + Math.round(paid).toLocaleString('it-IT') + '</div><div class="lbl">Pagato</div></div>' +
    '<div class="kpi red"><div class="val">€' + Math.round(saldo).toLocaleString('it-IT') + '</div><div class="lbl">Residuo</div></div>';

  var html = rows.map(function(r) {
    var cls = {Hotel:'chip-hotel',Volo:'chip-fly',Tour:'chip-tour'}[r.cat] || 'chip-transfer';
    return '<div class="card">' +
      '<div class="dr"><span class="dk">Categoria</span><span class="dv"><span class="chip ' + cls + '">' + r.cat + '</span></span></div>' +
      '<div class="dr"><span class="dk">Voce</span><span class="dv" style="font-size:12px;font-weight:700">' + r.voce + '</span></div>' +
      '<div class="dr"><span class="dk">Costo</span><span class="dv"><strong>€' + r.eur.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</strong> <span class="idr">' + Math.round(r.eur*IDR).toLocaleString('it-IT') + ' Rp</span></span></div>' +
      '<div class="dr"><span class="dk">Pagato</span><span class="dv">' + paidBadge(r.pagato) + '</span></div>' +
      (r.note ? '<div class="dr"><span class="dk">Note</span><span class="dv" style="font-size:12px">' + r.note + '</span></div>' : '') +
    '</div>';
  }).join('');
  document.getElementById('co-list').innerHTML = html;

  var cats = {};
  rows.forEach(function(r) { cats[r.cat] = (cats[r.cat]||0) + (r.eur||0); });
  var colors = ['var(--ocean)','var(--lagoon)','var(--turmeric)','var(--java)','var(--coral)'];
  var barsHtml = Object.entries(cats).map(function(entry, i) {
    var cat = entry[0], val = entry[1];
    var pct = totEur > 0 ? ((val/totEur)*100).toFixed(1) : 0;
    return '<div class="bar-row">' +
      '<div class="bar-label"><span>' + cat + '</span><span><strong>€' + Math.round(val).toLocaleString('it-IT') + '</strong> (' + pct + '%)</span></div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:0%;background:' + colors[i%colors.length] + '" data-w="' + pct + '%"></div></div></div>';
  }).join('');
  document.getElementById('co-bars').innerHTML = barsHtml;
  setTimeout(function() {
    document.querySelectorAll('.bar-fill').forEach(function(b) { b.style.width = b.getAttribute('data-w'); });
  }, 50);
}

function saveTransfer() {
  var obj = {
    id: _editTransferId || uid(),
    data: document.getElementById('mt-data').value,
    tipo: document.getElementById('mt-tipo').value,
    nome: document.getElementById('mt-nome').value,
    da: document.getElementById('mt-da').value,
    a: document.getElementById('mt-a').value,
    oraP: document.getElementById('mt-ora-p').value,
    oraA: document.getElementById('mt-ora-a').value,

    pagato: document.getElementById('mt-pagato').value||null,

  document.getElementById('mh-ref').value = h.ref||'';
  document.getElementById('mh-url').value = h.url||'';
  document.getElementById('mh-note').value = h.note||'';
  document.getElementById('modal-hotel').classList.add('open');
}
function saveHotel() {
  var obj = {
    id: _editHotelId || uid(),
    nome: document.getElementById('mh-nome').value,
    dest: document.getElementById('mh-dest').value.toUpperCase().trim(),
    cin: document.getElementById('mh-cin').value,
    cout: document.getElementById('mh-cout').value,
    costoEUR: parseFloat(document.getElementById('mh-costo').value)||null,
    pagato: document.getElementById('mh-pagato').value||null,
    ref: document.getElementById('mh-ref').value,
    url: document.getElementById('mh-url').value,
    note: document.getElementById('mh-note').value
  };
  if (!obj.nome||!obj.cin||!obj.cout) { alert('Compila almeno: nome, check-in, check-out.'); return; }
  if (obj.cout <= obj.cin) { alert('Check-out deve essere successivo al check-in.'); return; }
  if (_editHotelId) {
    var i = state.hotels.findIndex(function(x) { return x.id===_editHotelId; });
    if (i>=0) state.hotels[i] = obj;
  } else { state.hotels.push(obj); }
  closeModal('modal-hotel'); renderHotels(); autoSave();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(function(m) {
  m.addEventListener('click', function(e) { if (e.target===m) m.classList.remove('open'); });
});

function openAddDay() {
  var date = prompt('Data (YYYY-MM-DD):');
  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) { alert('Formato non valido.'); return; }
  if (state.days.find(function(d) { return d.data===date; })) { alert('Giorno già presente.'); return; }
  var loc = prompt('Destinazione (es. JAKARTA):', '') || '';
  state.days.push({id:uid(), data:date, giorno:state.days.length+1, localita:loc.toUpperCase().trim(), note:''});
  state.days.sort(function(a,b) { return cmp(a.data,b.data); });
  state.days.forEach(function(d,i) { d.giorno = i+1; });
  renderItinerary(); autoSave();
}

// ════════════════════════════════════════
//  IMPORT/EXPORT
// ════════════════════════════════════════
function importExcel(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(e.target.result, {type:'array',cellDates:true});
      var ws = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1,raw:false,dateNF:'yyyy-mm-dd'});
      rows.forEach(function(r) {
        if (!r[0] || !r[1]) return;
        var dateStr = typeof r[0]==='string' && r[0].includes('-') ? r[0].substring(0,10) : (r[0] instanceof Date ? r[0].toISOString().substring(0,10) : null);
        if (!dateStr) return;
        if (r[2] && typeof r[2]==='string') { var d = state.days.find(function(d) { return d.data===dateStr; }); if (d) d.localita = r[2].trim().toUpperCase(); }
      });
      alert('✅ Importato!');
      renderDashboard(); autoSave(); input.value='';
    } catch(err) { alert('Errore: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel() {
  var wb = XLSX.utils.book_new();
  var head = ['Data','Giorno','Destinazione','Alloggio','Check-in','Check-out','Notti','Costo Hotel €','Pagato Hotel','Ref. Hotel','Tipo Transfer','Vettore','Da','A','Ora P.','Ora A.','Costo Transfer €','Pagato Transfer','Note Transfer'];
  var rows = [head];
  state.days.forEach(function(d) {
    var hs = hotelsForDate(d.data); var ts = transfersForDate(d.data);
    var h=hs[0], t=ts[0];
    rows.push([d.data,d.giorno,d.localita,h?h.nome:'',h?h.cin:'',h?h.cout:'',h?nights(h.cin,h.cout):'',h?h.costoEUR:'',h?h.pagato:'',h?h.ref:'',t?t.tipo:'',t?t.nome:'',t?t.da:'',t?t.a:'',t?t.oraP:'',t?t.oraA:'',t?t.costo:'',t?t.pagato:'',t?t.note:'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), 'Itinerario');
  XLSX.writeFile(wb, 'Indonesia_2026_' + new Date().toISOString().slice(0,10) + '.xlsx');
}

var _map = null;

var TAPPE = [
  { id: 'JAKARTA',     nome: 'Jakarta',           lat: -6.2088,  lng: 106.8456, giorni: 3,  colore: '#0e7da3', icon: '🏙️' },
  { id: 'YOGYAKARTA',  nome: 'Yogyakarta',        lat: -7.7956,  lng: 110.3695, giorni: 3,  colore: '#258a5c', icon: '🏛️' },
  { id: 'UBUD',        nome: 'Ubud (Bali)',        lat: -8.5069,  lng: 115.2625, giorni: 4,  colore: '#e69c0d', icon: '🌿' },
  { id: 'GILI T.',     nome: 'Gili Trawangan',    lat: -8.3490,  lng: 116.0343, giorni: 5,  colore: '#1cb1db', icon: '🏝️' },
  { id: 'LABUAN BAJO', nome: 'Labuan Bajo',        lat: -8.4539,  lng: 119.8891, giorni: 5,  colore: '#d94838', icon: '🦎' },
  { id: 'JAKARTA2',    nome: 'Jakarta (rientro)', lat: -6.2688,  lng: 106.9456, giorni: 3,  colore: '#073b5a', icon: '✈️' }
];

var VOLI = [
  { da: 'JAKARTA',    a: 'YOGYAKARTA',  tipo: 'volo' },
  { da: 'YOGYAKARTA', a: 'UBUD',        tipo: 'volo' },
  { da: 'UBUD',       a: 'GILI T.',     tipo: 'ferry' },
  { da: 'GILI T.',    a: 'LABUAN BAJO', tipo: 'volo' },
  { da: 'LABUAN BAJO',a: 'JAKARTA2',    tipo: 'volo' }
];

function renderMappa() {
  // Inizializza mappa una volta sola
  if (!_map) {
    _map = L.map('map', { zoomControl: true, attributionControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18
    }).addTo(_map);
    L.control.attribution({ prefix: '© OpenStreetMap' }).addTo(_map);
  }

  // Pulisci layer precedenti (non il tile)
  _map.eachLayer(function(l) { if (!(l instanceof L.TileLayer)) _map.removeLayer(l); });

  var bounds = [];

  // Disegna le linee di trasferimento
  VOLI.forEach(function(v) {
    var daT = TAPPE.find(function(t) { return t.id === v.da; });
    var aT  = TAPPE.find(function(t) { return t.id === v.a || t.id === v.a.replace('2',''); });
    if (!daT || !aT) return;

    // Curva geodetica approssimata con più punti
    var pts = geodesicPoints([daT.lat, daT.lng], [aT.lat, aT.lng], 20);

    L.polyline(pts, {
      color:     v.tipo === 'volo' ? '#0e7da3' : '#e69c0d',
      weight:    v.tipo === 'volo' ? 2 : 2,
      opacity:   0.7,
      dashArray: v.tipo === 'volo' ? '8,5' : '4,4'
    }).addTo(_map).bindTooltip(
      v.tipo === 'volo' ? '✈️ ' + daT.nome + ' → ' + aT.nome
                        : '⛵ ' + daT.nome + ' → ' + aT.nome,
      { sticky: true, className: 'map-tooltip' }
    );
  });

  // Disegna i marker delle tappe
  TAPPE.forEach(function(t, i) {
    var coord = [t.lat, t.lng];
    bounds.push(coord);

    // Marker personalizzato con numero tappa e colore
    var num = i === TAPPE.length - 1 ? i : i + 1; // evita duplicato Jakarta
    var icon = L.divIcon({
      className: '',
      html: '<div style="' +
        'background:' + t.colore + ';' +
        'color:#fff;' +
        'width:34px;height:34px;' +
        'border-radius:50%;' +
        'display:flex;align-items:center;justify-content:center;' +
        'font-size:16px;' +
        'box-shadow:0 2px 8px rgba(0,0,0,0.35);' +
        'border:3px solid #fff;' +
        'font-weight:800;' +
        '">' + t.icon + '</div>',
      iconSize: [34, 34],
      iconAnchor: [17, 17]
    });

    L.marker(coord, { icon: icon })
      .addTo(_map)
      .bindPopup(
        '<div style="min-width:160px;font-family:inherit">' +
        '<div style="font-weight:800;font-size:15px;color:#073b5a;margin-bottom:6px">' + t.icon + ' ' + t.nome + '</div>' +
        '<div style="font-size:13px;color:#738596"><strong>' + t.giorni + '</strong> giorni</div>' +
        (t.id !== 'MXP' ? '<div style="margin-top:8px"><button onclick="goMapToItinerary(\'' + t.id + '\')" style="background:#073b5a;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:600">📅 Vedi itinerario</button></div>' : '') +
        '</div>',
        { maxWidth: 220 }
      );

    // Label nome città
    L.marker(coord, {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(255,255,255,0.92);border:1px solid #d1d9e2;border-radius:6px;padding:2px 7px;font-size:11px;font-weight:700;color:#073b5a;white-space:nowrap;margin-top:20px;box-shadow:0 1px 4px rgba(0,0,0,0.12)">' + t.nome + '</div>',
        iconAnchor: [-6, 28]
      }),
      interactive: false
    }).addTo(_map);
  });

  // Fit bounds su tutta la rotta
  if (bounds.length > 1) {
    _map.fitBounds(bounds, { padding: [40, 40] });
  }

  // Legenda testuale sotto la mappa
  var legHTML = '<div class="card">' +
    '<div style="font-weight:700;color:var(--ocean);margin-bottom:10px">Sequenza tappe</div>' +
    TAPPE.map(function(t, i) {
      var giorni = state.days.filter(function(d) { return d.localita === t.id.replace('2','') || (t.id === 'JAKARTA2' && d.localita === 'JAKARTA' && parseInt(d.data.split('-')[2]) > 20); }).length;
      return '<div class="dr">' +
        '<span class="dk"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + t.colore + ';margin-right:6px;vertical-align:middle"></span>' + t.icon + ' ' + t.nome + '</span>' +
        '<span class="dv" style="color:var(--mist)">' + (giorni || t.giorni) + ' giorni</span>' +
      '</div>';
    }).join('') +
    '<div style="margin-top:12px;font-size:12px;color:var(--mist);display:flex;gap:16px">' +
      '<span><span style="display:inline-block;width:20px;height:2px;background:#0e7da3;border-top:2px dashed #0e7da3;vertical-align:middle;margin-right:4px"></span>Volo</span>' +
      '<span><span style="display:inline-block;width:20px;height:2px;border-top:2px dashed #e69c0d;vertical-align:middle;margin-right:4px"></span>Traghetto</span>' +
    '</div>' +
  '</div>';
  document.getElementById('map-legend').innerHTML = legHTML;

  // Fix Leaflet su tab nascosta
  setTimeout(function() { _map.invalidateSize(); }, 100);
}

// Calcola punti intermedi su curva geodetica approssimata
function geodesicPoints(from, to, n) {
  var pts = [];
  for (var i = 0; i <= n; i++) {
    var f = i / n;
    pts.push([
      from[0] + (to[0] - from[0]) * f,
      from[1] + (to[1] - from[1]) * f
    ]);
  }
  return pts;
}

window.goMapToItinerary = function(locId) {
  var idx = state.days.findIndex(function(d) { return d.localita === locId; });
  if (idx >= 0) openDayInItinerary(idx);
};
